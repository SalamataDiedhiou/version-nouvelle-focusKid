<svg [attr.width]="size" [attr.height]="size" viewBox="0 0 100 100">
    <ng-container [ngSwitch]="type">

        <circle *ngSwitchCase="'circle'"
                cx="50" cy="50" r="44"
                [attr.fill]="color" />

        <rect *ngSwitchCase="'square'"
              x="8" y="8" width="84" height="84"
              rx="14"
              [attr.fill]="color" />

        <polygon *ngSwitchCase="'triangle'"
                 points="50,6 94,92 6,92"
                 [attr.fill]="color" />

        <polygon *ngSwitchCase="'star'"
                 [attr.points]="starPoints"
                 [attr.fill]="color" />

        <polygon *ngSwitchCase="'diamond'"
                 points="50,4 96,50 50,96 4,50"
                 [attr.fill]="color" />

        <polygon *ngSwitchCase="'pentagon'"
                 [attr.points]="pentagonPoints"
                 [attr.fill]="color" />

        <!-- Default -->
        <circle *ngSwitchDefault
                cx="50" cy="50" r="44"
                [attr.fill]="color" />

    </ng-container>
</svg>
